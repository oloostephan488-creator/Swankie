<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swankie Creations</title>
    <style>
        body { 
            background: #000; 
            color: white; 
            font-family: sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        
        .logo-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid #05f0ff; /* Neon Blue to match logo */
            margin: 30px auto;
            overflow: hidden;
            background: #111;
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 { font-size: 1.6rem; margin: 10px 0; }
        .alert { background: #900; padding: 12px; border-radius: 10px; margin: 20px 0; font-weight: bold; }
        .btn { background: #1a1a1a; border: 1px solid #333; padding: 25px 10px; border-radius: 15px; margin: 10px 1%; width: 45%; display: inline-block; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="logo-circle">
        <img src="logo.jpg" alt="Logo">
    </div>

    <h1>SWANKIE CREATIONS</h1>
    <p style="color: #888;">ART & LIFESTYLE</p>

    <div class="alert">⚠️ MPESA FOR BOOKINGS</div>

    <div class="btn">✒️<br>Tattoos</div>
    <div class="btn">💻<br>Graphics</div>
    <div class="btn">🎭<br>Body Art</div>
    <div class="btn">👕<br>Branding</div>

</body>
</html>
