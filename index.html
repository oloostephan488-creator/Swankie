<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Swankie Creations | Ally</title>
    <style>
        :root { --accent: #ffcc00; --bg: #0f0f0f; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #fff; margin: 0; text-align: center; }
        
        /* Profile Header */
        .header { padding: 40px 20px; background: linear-gradient(to bottom, #222, var(--bg)); border-bottom: 1px solid #333; }
        .pfp { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 10px; box-shadow: 0 0 15px rgba(255,204,0,0.3); }
        h1 { margin: 5px 0; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; }
        .tagline { color: #888; font-size: 0.8rem; letter-spacing: 1px; }

        /* Booking Alert */
        .alert { background: #610000; color: #ffbaba; margin: 20px; padding: 12px; border-radius: 10px; font-size: 0.75rem; font-weight: bold; border: 1px solid #ff000033; }

        /* Grid System */
        .section-label { text-align: left; padding: 0 25px; font-size: 0.7rem; color: var(--accent); text-transform: uppercase; margin-top: 25px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px 20px; }
        
        .service-btn { 
            background: var(--card); color: white; text-decoration: none; 
            padding: 18px 10px; border-radius: 15px; font-size: 0.85rem; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid #333; transition: 0.2s;
        }
        .service-btn:active { transform: scale(0.95); background: #252525; border-color: var(--accent); }
        .emoji { font-size: 1.4rem; margin-bottom: 8px; }

        /* Footer CTA */
        .main-cta { 
            display: block; background: var(--accent); color: #000; 
            margin: 30px 20px; padding: 18px; border-radius: 12px; 
            text-decoration: none; font-weight: bold; font-size: 1rem;
            box-shadow: 0 5px 15px rgba(255,204,0,0.2);
        }
        .footer { font-size: 0.65rem; color: #444; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
